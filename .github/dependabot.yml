version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # rstree is dependency-free today, but this keeps any future crate
    # additions up to date automatically.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Keeps CI actions (actions/checkout, dtolnay/rust-toolchain, ...) current.
