name: Bug report
description: Report a problem with ls-tree
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Run `ls-tree ./some/path`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ls-tree version
      description: Output of `ls-tree --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: e.g. Ubuntu 24.04, macOS 14, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Paste any relevant terminal output.
      render: shell
    validations:
      required: false
